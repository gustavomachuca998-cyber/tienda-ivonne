<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <!-- Fondo base crema cálido estilo Pinterest -->
  <rect width="100%" height="100%" fill="#FDF8F6"/>
  
  <!-- Formas abstractas grandes y suaves de fondo -->
  <circle cx="50" cy="50" r="45" fill="#FFEBF0" opacity="0.6" />
  <circle cx="230" cy="180" r="60" fill="#E8D3ED" opacity="0.4" />
  <path d="M200,40 Q240,20 260,60 Q280,100 230,120 Z" fill="#FFF0F5" opacity="0.7"/>

  <g stroke-linecap="round" stroke-linejoin="round" opacity="0.25">
    <!-- Silueta Minimalista de Cartera 1 (Arriba Derecha) -->
    <path d="M210,50 L240,50 A5,5 0 0,1 245,55 L245,75 A5,5 0 0,1 240,80 L210,80 A5,5 0 0,1 205,75 L205,55 A5,5 0 0,1 210,50 Z" fill="none" stroke="#D81B60" stroke-width="1.5"/>
    <path d="M213,50 A12,12 0 0,1 237,50" fill="none" stroke="#D81B60" stroke-width="1.5"/>
    
    <!-- Silueta Minimalista de Cartera 2 (Abajo Izquierda) -->
    <path d="M40,210 L80,210 L85,245 L35,245 Z" fill="none" stroke="#4A148C" stroke-width="1.5"/>
    <path d="M48,210 Q60,190 72,210" fill="none" stroke="#4A148C" stroke-width="1.5"/>
    <circle cx="60" cy="225" r="3" fill="#4A148C"/>

    <!-- Detalles de líneas estéticas y destellos -->
    <path d="M140,70 L140,90 M130,80 L150,80" stroke="#FFB300" stroke-width="1"/>
    <path d="M250,220 L250,235 M242.5,227.5 L257.5,227.5" stroke="#D81B60" stroke-width="1"/>
    
    <!-- Ramita botánica abstracta minimalista -->
    <path d="M110,180 Q125,150 150,160" fill="none" stroke="#4A148C" stroke-width="1.2"/>
    <circle cx="122" cy="168" r="2.5" fill="#4A148C"/>
    <circle cx="135" cy="157" r="2.5" fill="#4A148C"/>
    <circle cx="148" cy="158" r="2.5" fill="#4A148C"/>
  </g>
</svg>
